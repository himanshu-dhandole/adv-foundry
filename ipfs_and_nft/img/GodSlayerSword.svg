<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 720" width="100%">
  <defs>
    <style>
      .void-trail { stroke: #ff00ff; fill: none; opacity: 0.7; }
      .null-path { stroke: #00ffff; fill: none; opacity: 0.6; }
      .void-spark { fill: #ffff00; filter: drop-shadow(0 0 3px #ffff00); }
      .cosmic-glow { fill: #ff00ff; opacity: 0.4; }
    </style>
  </defs>
  
  <!-- Dimensional rift trails - magenta -->
  <path d="M 55 70 Q 35 200 50 380 Q 38 540 60 700" class="void-trail" stroke-width="2"/>
  <path d="M 185 110 Q 205 260 190 450 Q 205 600 185 710" class="void-trail" stroke-width="2"/>
  
  <!-- Reality fracture lines - cyan -->
  <path d="M 70 100 Q 90 250 75 420 Q 88 580 75 690" class="null-path" stroke-width="1.5"/>
  <path d="M 170 150 Q 150 300 165 480 Q 152 620 165 700" class="null-path" stroke-width="1.5"/>
  
  <!-- Cosmic star particles -->
  <circle cx="50" cy="110" r="2" class="void-spark"/>
  <circle cx="190" cy="160" r="2" class="void-spark"/>
  <circle cx="55" cy="290" r="1.5" class="void-spark"/>
  <circle cx="185" cy="350" r="1.5" class="void-spark"/>
  <circle cx="60" cy="520" r="1.5" class="void-spark"/>
  <circle cx="180" cy="600" r="1.8" class="void-spark"/>
  
  <!-- Additional void sparks -->
  <circle cx="45" cy="200" r="1" class="void-spark" opacity="0.7"/>
  <circle cx="195" cy="280" r="1" class="void-spark" opacity="0.7"/>
  <circle cx="50" cy="450" r="1" class="void-spark" opacity="0.7"/>
  
  <!-- Main blade - void black with magenta edge -->
  <path d="M120 20 
           L133 95 
           L133 530 
           Q120 560 107 530 
           L107 95 Z"
        fill="#050010" stroke="#ff00ff" stroke-width="2.5" stroke-linejoin="round"/>
  
  <!-- Blade inner void -->
  <path d="M120 20 L133 95 L133 530 Q120 560 107 530 L107 95 Z" fill="#1a0030" opacity="0.8"/>
  
  <!-- Blade magenta edge glow -->
  <line x1="120" y1="20" x2="120" y2="540" stroke="#ff00ff" stroke-width="3.5" opacity="0.95"/>
  <line x1="118" y1="50" x2="118" y2="520" stroke="#ff00ff" stroke-width="1.5" opacity="0.7"/>
  <line x1="122" y1="50" x2="122" y2="520" stroke="#00ffff" stroke-width="1" opacity="0.6"/>
  
  <!-- Blade void darkness -->
  <path d="M107 95 L107 530 Q120 560 133 530 L133 95" fill="#0a0015" opacity="0.6"/>
  
  <!-- Universe-breaking runes -->
  <path d="M 105 130 L 120 150 L 105 170 L 90 150 Z" fill="none" stroke="#00ffff" stroke-width="1.8" opacity="0.9"/>
  <path d="M 130 240 L 148 270 L 130 300 L 112 270 Z" fill="none" stroke="#00ffff" stroke-width="1.8" opacity="0.8"/>
  <path d="M 110 370 L 128 405 L 110 440 L 92 405 Z" fill="none" stroke="#00ffff" stroke-width="1.8" opacity="0.9"/>
  <path d="M 135 510 L 155 545 L 135 580 L 115 545 Z" fill="none" stroke="#00ffff" stroke-width="1.8" opacity="0.8"/>
  
  <!-- Reality fracture marks -->
  <line x1="95" y1="180" x2="145" y2="180" stroke="#00ffff" stroke-width="2" opacity="0.8"/>
  <line x1="92" y1="300" x2="148" y2="300" stroke="#00ffff" stroke-width="2" opacity="0.7"/>
  <line x1="95" y1="460" x2="145" y2="460" stroke="#00ffff" stroke-width="2" opacity="0.8"/>
  
  <!-- Fuller - void channel -->
  <rect x="117" y="110" width="6" height="390" rx="3" fill="#0a0015" stroke="#00ffff" stroke-width="1" opacity="0.8"/>
  <circle cx="120" cy="120" r="3.5" fill="#00ffff" opacity="0.7"/>
  
  <!-- Guard - dimensional rift -->
  <rect x="65" y="545" width="110" height="24" rx="6" fill="#1a0030" stroke="#ff00ff" stroke-width="2"/>
  
  <!-- Guard patterns -->
  <ellipse cx="120" cy="557" rx="60" ry="10" fill="#00ffff" opacity="0.4"/>
  <path d="M 80 555 Q 110 565 140 555" fill="none" stroke="#00ffff" stroke-width="1.5" opacity="0.8"/>
  
  <!-- Guard chaos gems -->
  <circle cx="85" cy="557" r="3" fill="#00ffff" opacity="0.95" filter="drop-shadow(0 0 3px #00ffff)"/>
  <circle cx="120" cy="557" r="3.5" fill="#ff00ff" opacity="0.9" filter="drop-shadow(0 0 3px #ff00ff)"/>
  <circle cx="155" cy="557" r="3" fill="#00ffff" opacity="0.95" filter="drop-shadow(0 0 3px #00ffff)"/>
  
  <!-- Handle - void material -->
  <rect x="112" y="569" width="16" height="120" rx="7" fill="#0a0010" stroke="#ff00ff" stroke-width="1.5"/>
  
  <!-- Handle void inscriptions -->
  <line x1="105" y1="590" x2="135" y2="590" stroke="#00ffff" stroke-width="1.2" opacity="0.7"/>
  <line x1="105" y1="620" x2="135" y2="620" stroke="#00ffff" stroke-width="1.2" opacity="0.7"/>
  <line x1="105" y1="650" x2="135" y2="650" stroke="#00ffff" stroke-width="1.2" opacity="0.6"/>
  
  <!-- Pommel - reality nexus -->
  <circle cx="120" cy="695" r="20" fill="#1a0030" stroke="#ff00ff" stroke-width="2"/>
  <circle cx="120" cy="695" r="16" fill="#ff00ff" opacity="0.7"/>
  <circle cx="120" cy="695" r="11" fill="#00ffff" opacity="0.8"/>
  <circle cx="120" cy="695" r="6" fill="#ffff00" opacity="0.9"/>
  
  <!-- Pommel chaos cores -->
  <circle cx="115" cy="688" r="2" class="void-spark"/>
  <circle cx="125" cy="690" r="1.5" class="void-spark"/>
  <circle cx="120" cy="703" r="1" class="void-spark"/>
  
  <!-- Pommel reality warping rings -->
  <circle cx="120" cy="695" r="24" fill="none" stroke="#ff00ff" stroke-width="1.5" opacity="0.6"/>
  <circle cx="120" cy="695" r="30" fill="none" stroke="#00ffff" stroke-width="1" opacity="0.4"/>
  <circle cx="120" cy="695" r="36" fill="none" stroke="#ff00ff" stroke-width="0.8" opacity="0.2"/>
</svg>